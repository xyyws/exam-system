server:
  port: ${SERVER_PORT:8081}
  compression:
    enabled: false

spring:
  jackson:
    deserialization:
      fail-on-unknown-properties: false
  application:
    name: online-exam-backend
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/online_exam?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: 0
      timeout: 3000ms

jwt:
  secret: ${JWT_SECRET:exam-online-system-jwt-secret-key-2026}
  access-token-expire: ${JWT_ACCESS_EXPIRE:7200000}
  refresh-token-expire: ${JWT_REFRESH_EXPIRE:1209600000}

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.exam
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.exam: info

